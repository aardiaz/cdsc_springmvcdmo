<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>contact</title>
</head>
<body>
	
	<th:block th:insert="Header.html"></th:block>
	
	<div class="container-fluid">
	
		<div class="card">
	
			<div class="card-header text-center bg-primary text-white">
				<h4> Contact Details</h4>
			</div>
	
			<div class="card-body">
	
			<form action="/contact" method="post" >
				<div class="row p-2">
					<div class="col-4">To Email: </div>
					<div class="col-6">
						<input type="text" name="toEmail" class="form-control">
					</div>
			</div>
	
			<div class="row p-2">
				<div class="col-4">Subject </div>
				<div class="col-6">
					<input type="text" name="subject" class="form-control">
				</div>
			</div>
	
			<div class="row p-2">
				<div class="col-4"> Message : </div>
				<div class="col-6">
					<textarea name="message" rows="5" cols="30" class="form-control"></textarea>
				</div>
			</div>
	
			<div class="row p-2">
				<div class="col-4"></div>
				<div class="col-6">
					<input type="submit" value="Send" class="btn btn-success">
				</div>
			</div>
	
			</form>
	
			[[${message}]]
	
		</div>
	
	
		<div class="card-footer text-center  bg-warning">copyright@2026</div>
	</div>
	
	</div>

</body>
</html>
