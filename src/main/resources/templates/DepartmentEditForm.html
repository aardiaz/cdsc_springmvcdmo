<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>departmentEditForm</title>
<!-- Latest compiled and minified CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Latest compiled JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	
	<div class="container-fluid">
	
			<div class="card">
	
				<div class="card-header text-center bg-primary text-white">
					<h4> Department Edit</h4>
				</div>
	
				<div class="card-body">
	
					<form action="/department/update"  method="post" th:object="${dModel}" >
					
					<div class="row p-2">
						<div class="col-4">Department Name</div>
						<div class="col-6">
							<input type="text" th:field="*{deptName}" class="form-control">
						</div>
					</div>
	
					<div class="row p-2">
						<div class="col-4">Department Phone</div>
						<div class="col-6">
							<input type="text" th:field="*{deptPhone}" class="form-control">
						</div>
					</div>
	
					<div class="row p-2">
						<div class="col-4">Department Head(HoD)</div>
						<div class="col-6">
							<input type="text" th:field="*{deptHead}" class="form-control">
						</div>
					</div>
	
					<div class="row p-2">
						<div class="col-4"></div>
						<div class="col-6">
							<input type="submit" value="Update Department" class="btn btn-success">
						</div>
					</div>
					
					 <input type="hidden" th:field="*{deptId}" >
					
					</form>
	
				</div>
	
	
				<div class="card-footer text-center  bg-warning">copyright@2026</div>
			</div>
	
		</div>

</body>
</html>
