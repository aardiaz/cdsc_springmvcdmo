<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>gallery</title>
</head>
<body>
	
	<th:block th:insert="Header.html" ></th:block>
		
		<div class="container-fluid">
	
			<div class="card">
	
				<div class="card-header text-center bg-primary text-white">
					<h4> Image Gallery </h4>
				</div>
	
				<div class="card-body">
	
					<span  th:each="imgname : ${imglist}" >
						
						<img class="p-2" th:src="@{'/images/'+${imgname}}" width="300px;" height="300px;" >
						
					</span>
	
				</div>
	
				<div class="card-footer text-center  bg-warning">copyright@2026</div>
			</div>
	
		</div>
	


</body>
</html>
